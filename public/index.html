<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">

        tailwind.config = {
            theme: {
                extend: {

  <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Dark Theme */
        body.dark-theme { background: #020617; }
        .dark-theme .glass { background: rgba(15, 23, 42, 0.6); border-color: rgba(255,255,255,0.05); }
        .dark-theme .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dark-theme .card-hover:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 20px 60px -15px rgba(59, 130, 246, 0.3); }
        
        /* Light Theme */
        body.light-theme { background: #f8fafc; }
        .light-theme .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.08); }
        .light-theme .glass { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .light-theme .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .light-theme .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 60px -15px rgba(59, 130, 246, 0.2); }
        .light-theme { color: #1e293b; }
        .light-theme .text-slate-100 { color: #1e293b; }
        .light-theme .text-slate-400 { color: #64748b; }
        .light-theme .text-slate-500 { color: #6b7280; }
        .light-theme .text-slate-700 { color: #334155; }
        .light-theme .text-slate-800 { color: #1e293b; }
        .light-theme .bg-slate-800 { background-color: #e2e8f0; }
        .light-theme .bg-slate-800\/50 { background-color: rgba(226, 232, 240, 0.5); }
        .light-theme .bg-slate-800\/30 { background-color: rgba(226, 232, 240, 0.3); }
        .light-theme .border-slate-700 { border-color: #cbd5e1; }
        .light-theme .border-slate-700\/50 { border-color: rgba(203, 213, 225, 0.5); }
        .light-theme .border-slate-800 { border-color: #cbd5e1; }
        .light-theme .hover\:bg-slate-800 { background-color: #e2e8f0; }
        .light-theme .hover\:bg-slate-800:hover { background-color: #cbd5e1; }
        .light-theme .sidebar-item { transition: all 0.2s; }
        .light-theme .sidebar-item:hover { background: rgba(59, 130, 246, 0.08); }
        .light-theme .sidebar-item.active { background: rgba(59, 130, 246, 0.1); border-right-color: #3b82f6; }
        .light-theme .bg-slate-700 { background-color: #cbd5e1; }
        .light-theme .bg-slate-900 { background-color: #f1f5f9; }
        .light-theme .bg-slate-900\/50 { background-color: rgba(241, 245, 249, 0.5); }
        .light-theme ::-webkit-scrollbar-track { background: #f1f5f9; }
        .light-theme ::-webkit-scrollbar-thumb { background: #cbd5e1; }
        
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 20px 60px -15px rgba(59, 130, 246, 0.3); }
        .gradient-border { position: relative; }
        .gradient-border::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px; background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .flow-line { stroke-dasharray: 8 4; animation: flowDash 1.5s linear infinite; }
        @keyframes flowDash { to { stroke-dashoffset: -12; } }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.15); border-right: 3px solid #3b82f6; }
        .chart-bar { animation: growUp 0.8s ease-out forwards; transform-origin: bottom; }
        @keyframes growUp { from { transform: scaleY(0); } to { transform: scaleY(1); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .topology-node { transition: all 0.3s; }
        .topology-node:hover { filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.6)); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .voucher-card { width: 170px; height: 85px; border: 1px dashed #475569; }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-slate-950 text-slate-100 overflow-hidden dark-theme" id="app-body">
  <div id="app" class="h-full flex">
   <!-- Sidebar -->
   <aside class="w-64 h-full glass flex flex-col shrink-0">

      <div>

     </div>
    </div>
    <nav class="flex-1 py-3 overflow-y-auto">
     <div class="px-3 mb-2 text-[10px] uppercase text-slate-500 font-semibold tracking-wider">
      Main
     </div>
     <div class="nav-items space-y-0.5 px-2">
      <a href="#" class="sidebar-item active flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="dashboard"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="billing"><i data-lucide="receipt" class="w-4 h-4"></i>Billing</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="customers"><i data-lucide="users" class="w-4 h-4"></i>Customers</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="network"><i data-lucide="server" class="w-4 h-4"></i>Network</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="mikrotik"><i data-lucide="cpu" class="w-4 h-4"></i>MikroTik</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="voucher"><i data-lucide="ticket" class="w-4 h-4"></i>Voucher</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="tickets"><i data-lucide="message-circle" class="w-4 h-4"></i>Tickets</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="inventory"><i data-lucide="package" class="w-4 h-4"></i>Inventory</a>
     </div>
     <div class="px-3 mt-4 mb-2 text-[10px] uppercase text-slate-500 font-semibold tracking-wider">
      System
     </div>
     <div class="px-2 space-y-0.5">
      <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="onboarding"><i data-lucide="rocket" class="w-4 h-4"></i>Onboarding</a> <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm" data-page="settings"><i data-lucide="settings" class="w-4 h-4"></i>Settings</a>
     </div>
    </nav>
    <div class="p-3 border-t border-slate-700/50">
     <div class="flex items-center gap-3 px-2">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-xs font-bold">
       SA
      </div>
      <div class="flex-1 min-w-0">
       <p class="text-xs font-medium truncate">Super Admin</p>
       <p class="text-[10px] text-slate-400">ISP Maju Jaya</p>
      </div>
     </div>
    </div>
   </aside><!-- Main Content -->
   <main class="flex-1 h-full overflow-y-auto">
    <!-- Top Bar -->
    <header class="sticky top-0 z-10 glass px-6 py-3 flex items-center justify-between">
     <div class="flex items-center gap-4">
      <h2 id="page-title" class="text-lg font-semibold">Dashboard</h2><span class="px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400 text-[10px] font-medium flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-dot"></span>Live</span>
     </div>
     <div class="flex items-center gap-3">
      <button class="relative p-2 rounded-lg hover:bg-slate-800 transition"><i data-lucide="bell" class="w-4 h-4"></i><span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span></button> <button class="p-2 rounded-lg hover:bg-slate-800 transition"><i data-lucide="search" class="w-4 h-4"></i></button> <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-800 transition flex items-center gap-2" title="Toggle theme"><i id="theme-icon" data-lucide="moon" class="w-4 h-4"></i></button>
     </div>
    </header><!-- Pages -->
    <div id="page-content" class="p-6">
     <!-- Dashboard page rendered by JS -->
    </div>
   </main>
  </div>
  <script>
    const defaultConfig = {
        platform_name: 'NetBill Pro',
        tagline: 'ISP Billing & Network',
        theme_mode: 'dark',
        background_color: '#020617',
        surface_color: '#0f172a',
        text_color: '#e2e8f0',
        primary_color: '#3b82f6',
        accent_color: '#8b5cf6'
    };

    let currentPage = 'dashboard';
    let isDarkMode = true;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        applyTheme();
    }

    function applyTheme() {
        const body = document.getElementById('app-body');
        const themeIcon = document.getElementById('theme-icon');
        
        if (isDarkMode) {
            body.classList.remove('light-theme');
            body.classList.add('dark-theme');
            themeIcon.setAttribute('data-lucide', 'moon');
            themeIcon.setAttribute('title', 'Switch to light mode');
        } else {
            body.classList.remove('dark-theme');
            body.classList.add('light-theme');
            themeIcon.setAttribute('data-lucide', 'sun');
            themeIcon.setAttribute('title', 'Switch to dark mode');
        }
        lucide.createIcons();
    }

    // Pages content
    const pages = {
        dashboard: () => `
            <div class="fade-in space-y-6">
                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    ${statCard('Rp 847.5M', 'Revenue MTD', 'trending-up', '+12.5%', 'emerald')}
                    ${statCard('2,847', 'Active Customers', 'users', '+48', 'blue')}
                    ${statCard('98.7%', 'Uptime', 'activity', 'Excellent', 'cyan')}
                    ${statCard('23', 'Open Tickets', 'message-circle', '-5 today', 'amber')}
                </div>
                <!-- Charts Row -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="lg:col-span-2 glass rounded-xl p-5">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-semibold text-sm">Revenue Overview</h3>
                            <select class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-xs"><option>Last 12 Months</option></select>
                        </div>
                        <div class="flex items-end gap-2 h-40">
                            ${[65,72,58,80,75,90,85,92,88,95,87,100].map((h,i) => `<div class="flex-1 flex flex-col items-center gap-1"><div class="w-full rounded-t-md bg-gradient-to-t from-blue-600 to-purple-500 chart-bar" style="height:${h}%;animation-delay:${i*0.05}s"></div><span class="text-[9px] text-slate-500">${['J','F','M','A','M','J','J','A','S','O','N','D'][i]}</span></div>`).join('')}
                        </div>
                    </div>
                    <div class="glass rounded-xl p-5">
                        <h3 class="font-semibold text-sm mb-4">Customer Growth</h3>
                        <div class="space-y-3">
                            ${growthItem('New', 48, 'emerald')}
                            ${growthItem('Active', 2847, 'blue')}
                            ${growthItem('Churned', 12, 'red')}
                            ${growthItem('Isolated', 34, 'amber')}
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-700/50">
                            <p class="text-xs text-slate-400">Churn Rate</p>
                            <p class="text-2xl font-bold text-emerald-400">0.42%</p>
                        </div>
                    </div>
                </div>
                <!-- Bandwidth & Recent -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="glass rounded-xl p-5">
                        <h3 class="font-semibold text-sm mb-4">Bandwidth Usage (Realtime)</h3>
                        <svg viewBox="0 0 400 120" class="w-full">
                            <defs><linearGradient id="bwGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/></linearGradient></defs>
                            <path d="M0,80 Q50,60 100,70 T200,50 T300,65 T400,40" fill="none" stroke="#3b82f6" stroke-width="2"/>
                            <path d="M0,80 Q50,60 100,70 T200,50 T300,65 T400,40 L400,120 L0,120Z" fill="url(#bwGrad)"/>
                            <path d="M0,90 Q50,85 100,88 T200,75 T300,80 T400,70" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2"/>
                        </svg>
                        <div class="flex gap-4 mt-2 text-xs"><span class="flex items-center gap-1"><span class="w-3 h-0.5 bg-blue-500 rounded"></span>Download: 4.2 Gbps</span><span class="flex items-center gap-1"><span class="w-3 h-0.5 bg-purple-500 rounded"></span>Upload: 1.8 Gbps</span></div>
                    </div>
                    <div class="glass rounded-xl p-5">
                        <h3 class="font-semibold text-sm mb-4">Recent Invoices</h3>
                        <div class="space-y-2">
                            ${recentInvoice('INV-2024-001847', 'PT Maju Jaya', 'Rp 350.000', 'paid')}
                            ${recentInvoice('INV-2024-001846', 'Warnet Galaxy', 'Rp 1.200.000', 'paid')}
                            ${recentInvoice('INV-2024-001845', 'Budi Santoso', 'Rp 250.000', 'overdue')}
                            ${recentInvoice('INV-2024-001844', 'Café Digital', 'Rp 500.000', 'pending')}
                        </div>
                    </div>
                </div>
            </div>
        `,
        billing: () => `
            <div class="fade-in space-y-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold">Billing Engine</h3>
                        <p class="text-xs text-slate-400">Auto-generate, prorate, late fees & multi-gateway</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i>Generate Invoice</button>
                        <button onclick="exportBillingData()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-sm font-medium transition flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i>Export</button>
                    </div>
                </div>
                <!-- Payment Gateways -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    ${gatewayCard('Midtrans', 'Active', '✓', 'emerald')}
                    ${gatewayCard('Xendit', 'Active', '✓', 'blue')}
                    ${gatewayCard('Manual Transfer', 'Active', '✓', 'purple')}
                </div>
                <!-- Billing Settings -->
                <div class="glass rounded-xl p-5">
                    <h4 class="font-semibold text-sm mb-4">Billing Configuration</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-slate-800/50 rounded-lg p-4"><p class="text-[10px] text-slate-400 uppercase">Billing Cycle</p><p class="text-lg font-bold">Monthly</p><p class="text-xs text-slate-400">Every 1st</p></div>
                        <div class="bg-slate-800/50 rounded-lg p-4"><p class="text-[10px] text-slate-400 uppercase">Late Fee</p><p class="text-lg font-bold">Rp 10.000</p><p class="text-xs text-slate-400">After 7 days</p></div>
                        <div class="bg-slate-800/50 rounded-lg p-4"><p class="text-[10px] text-slate-400 uppercase">Auto Isolir</p><p class="text-lg font-bold text-amber-400">Day 14</p><p class="text-xs text-slate-400">After due date</p></div>
                        <div class="bg-slate-800/50 rounded-lg p-4"><p class="text-[10px] text-slate-400 uppercase">Prorate</p><p class="text-lg font-bold text-emerald-400">Enabled</p><p class="text-xs text-slate-400">Per-day calculation</p></div>
                    </div>
                </div>
                <!-- Invoice Table -->
                <div class="glass rounded-xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-800/50"><tr><th class="px-4 py-3 text-left text-xs text-slate-400">Invoice</th><th class="px-4 py-3 text-left text-xs text-slate-400">Customer</th><th class="px-4 py-3 text-left text-xs text-slate-400">Amount</th><th class="px-4 py-3 text-left text-xs text-slate-400">Due Date</th><th class="px-4 py-3 text-left text-xs text-slate-400">Status</th><th class="px-4 py-3 text-left text-xs text-slate-400">Action</th></tr></thead>
                        <tbody>
                            ${invoiceRow('INV-001847','Budi Santoso','Rp 350.000','2024-02-01','paid')}
                            ${invoiceRow('INV-001846','Warnet Galaxy','Rp 1.200.000','2024-02-01','paid')}
                            ${invoiceRow('INV-001845','Café Digital','Rp 500.000','2024-01-25','overdue')}
                            ${invoiceRow('INV-001844','Toko Makmur','Rp 250.000','2024-02-05','pending')}
                            ${invoiceRow('INV-001843','RT 05 Net','Rp 750.000','2024-02-01','isolated')}
                        </tbody>
                    </table>
                </div>
            </div>
        `,
        customers: () => `
            <div class="fade-in space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold">Customer Management</h3>
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4"></i>Add Customer</button>
                        <button onclick="exportCustomerData()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-sm font-medium transition flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i>Export</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    ${miniStat('Total', '2,847', 'users')}
                    ${miniStat('Active', '2,761', 'check-circle')}
                    ${miniStat('Isolated', '34', 'shield-off')}
                    ${miniStat('Suspended', '52', 'x-circle')}
                </div>
                <div class="glass rounded-xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-800/50"><tr><th class="px-4 py-3 text-left text-xs text-slate-400">Customer</th><th class="px-4 py-3 text-left text-xs text-slate-400">Plan</th><th class="px-4 py-3 text-left text-xs text-slate-400">IP Address</th><th class="px-4 py-3 text-left text-xs text-slate-400">Status</th><th class="px-4 py-3 text-left text-xs text-slate-400">Due</th></tr></thead>
                        <tbody>
                            ${customerRow('Budi Santoso','20 Mbps','192.168.1.101','active','Feb 1')}
                            ${customerRow('Warnet Galaxy','100 Mbps','192.168.1.102','active','Feb 1')}
                            ${customerRow('Café Digital','50 Mbps','192.168.1.103','isolated','Jan 25')}
                            ${customerRow('Toko Makmur','10 Mbps','192.168.1.104','active','Feb 5')}
                            ${customerRow('RT 05 Net','30 Mbps','192.168.1.105','suspended','Jan 15')}
                        </tbody>
                    </table>
                </div>
            </div>
        `,
        network: () => `
            <div class="fade-in space-y-6">
                <h3 class="text-lg font-semibold">Network Topology</h3>
                <div class="glass rounded-xl p-6">
                    <svg viewBox="0 0 800 300" class="w-full">
                        <!-- Internet -->
                        <g class="topology-node"><rect x="350" y="10" width="100" height="40" rx="8" fill="#1e293b" stroke="#3b82f6"/><text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-size="11">Internet</text></g>
                        <!-- Core Router -->
                        <line x1="400" y1="50" x2="400" y2="90" stroke="#3b82f6" stroke-width="2" class="flow-line"/>
                        <g class="topology-node"><rect x="340" y="90" width="120" height="40" rx="8" fill="#1e293b" stroke="#8b5cf6"/><text x="400" y="115" text-anchor="middle" fill="#e2e8f0" font-size="11">Core MikroTik</text></g>
                        <!-- Distribution -->
                        <line x1="400" y1="130" x2="200" y2="180" stroke="#06b6d4" stroke-width="1.5" class="flow-line"/>
                        <line x1="400" y1="130" x2="400" y2="180" stroke="#06b6d4" stroke-width="1.5" class="flow-line"/>
                        <line x1="400" y1="130" x2="600" y2="180" stroke="#06b6d4" stroke-width="1.5" class="flow-line"/>

    // Export Functions
    function downloadCSV(data, filename) {
        const csv = data.map(row => Object.values(row).map(v => `"${v}"`).join(',')).join('\n');
        const headers = Object.keys(data[0]).map(h => `"${h}"`).join(',');
        const fullCSV = headers + '\n' + csv;
        const blob = new Blob([fullCSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
    }
